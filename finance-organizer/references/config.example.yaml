# Example .finance-organizer/config.yaml
# A fictional worked example. Onboarding produces a file like this from the user's
# answers — replace every value below with your own. All last-4 digits, names, and
# numbers here are made up.
version: 1

company:
  name: "Example Pro Corp"
  primary_contact: "Jane Doe"
  locality:
    country: "Canada"
    region: "Alberta"
    currency: "CAD"
  fiscal_year_end: "08-31"   # business FYE; personal sets use 12-31

household:                   # from onboarding: "how many household members?"
  size: 2
  members: ["Jane Doe", "John Doe"]

ledger:
  backend: "beancount"        # beancount | simple
  beancount_main: "Business - Example Pro Corp/Beancount/main.beancount"

sets_of_books:
  - id: "business"
    label: "Example Pro Corp"
    type: "business"
    fiscal_year_end: "08-31"
    folder: "Business - Example Pro Corp"
    ledger_main: "Business - Example Pro Corp/Beancount/main.beancount"
  - id: "owner"
    label: "Jane Doe (personal)"
    type: "personal"
    fiscal_year_end: "12-31"
    folder: "Personal - Jane Doe"
    ledger_main: "Personal - Jane Doe/Beancount/main.beancount"
  - id: "spouse"
    label: "John Doe (personal)"
    type: "personal"
    fiscal_year_end: "12-31"
    folder: "Personal - John Doe"

overlap:
  shareholder_loan_account: "Liabilities:Current:DueToShareholder"
  due_from_business_account: "Assets:DueFromBusiness"
  personal_card_expense_doc: "Business - Example Pro Corp/Reports/Expenses Paid on Personal Cards.md"
  personal_card_expense_copies_dir: "Business - Example Pro Corp/Expenses/Paid on Personal Accounts"

accounts:
  - last4: "1111"
    name: "Business chequing"
    set: "business"
    role: "operating"
  - last4: "2222"
    name: "Business Visa"
    set: "business"
    role: "card"
  - last4: "3333"
    name: "Personal Visa"
    set: "owner"
    role: "card"
  - last4: "4444"
    name: "Joint chequing (held in full under owner; spouse side = transfer)"
    set: "owner"
    role: "operating"

prior_financials:               # optional — accountant/audited statements from prior years
  - set: "business"             # which set of books these belong to
    accountant: "Example Accounting LLP"
    years: ["FY2024", "FY2025"]
    statements:                 # filed copies of the prior-year financials (originals live in the set's Reports/)
      - "Business - Example Pro Corp/FY2024/Reports/FY2024 Financial Statements.pdf"
      - "Business - Example Pro Corp/FY2025/Reports/FY2025 Financial Statements.pdf"
    chart_of_accounts:          # the categories the accountant used — reused verbatim so comparatives tie out
      income:
        - "Professional Fees"
        - "Other Income"
      expenses:
        - "Salaries and Wages"
        - "Office and Supplies"
        - "Professional Dues and Licences"
        - "Insurance"
        - "Travel"
    notes: >
      Match these category names so year-over-year comparatives line up with the
      accountant's statements. New categories go through the learn protocol.

tax:
  registrations:
    - kind: "GST/HST"
      number: "000000000RT0001"
      rate: 0.05
      filing: "quarterly"
  notes: >
    Example only. Describe your own jurisdiction's rules here (e.g. which sales tax
    applies, the rate, and how often you file). Leave input-tax credits for your
    accountant unless told otherwise.

filing:
  inbox: "Finance Inbox"
  rename_ledger_per_set: true

modules:
  related_party: true
  claims_helper: true
  payment_plan: true
  bill_reminders: true
  brand_output: false
  integrations: true

related_parties:
  - name: "Related Co"
    type: "related-company"
    cards: ["8881", "8882"]
    notes: "Example: business contributes; reimbursements owed tracked via flag-expense."

claims:
  plan_name: "Health Spending Account"
  eligible: ["prescriptions", "dental", "vision", "out-of-pocket medical not covered by other insurance"]
  ineligible: ["cosmetics / skincare", "gym / fitness"]
  admin_fee_pct: 0.05
  tax_on_fee_pct: 0.05
  form_path: "Personal - Jane Doe/Claims/Claim Form - {period} (working).xlsx"
  period_end: "08-31"

calendar:                      # provider-agnostic — Google Calendar, Microsoft Outlook/365, etc.
  provider: "google"           # google | microsoft | apple | other (the calendar connector you linked)
  id: "REPLACE_WITH_FINANCE_CALENDAR_ID"   # a dedicated "Finance" calendar is recommended (you create it; the plugin can't)
  timezone: "America/Edmonton"             # IANA timezone
  # Google example id: 7e5f…@group.calendar.google.com  | Microsoft: the calendar's name or id

payment_plan:
  daily_limit: 6000
  currency: "CAD"
  # calendar_id: optional override — defaults to calendar.id above

bill_reminders:                # recurring statement due dates + minimum payments → calendar
  # calendar_id: optional override — defaults to calendar.id above
  lead_days: 3                 # remind this many days before each due date
  tracker_path: "Business - Example Pro Corp/Reports/Payments Due.md"
  refresh: "recurring"         # recurring | on_demand
  refresh_cron: "0 9 8 * *"    # if recurring: when to regenerate (e.g. 9am on the 8th, after statements land)
  accounts:                    # which mapped accounts to remind on, and how they're paid
    - last4: "2222"            # Business Visa
      mode: "manual"           # manual = you pay it → "Pay"; auto_debit = pre-authorized → "Ensure funds"
    - last4: "3333"            # Personal Visa
      mode: "manual"

integrations:                  # financial tools you've connected (tool-agnostic)
  accounting: "quickbooks"     # quickbooks | xero | none
  payments: ["square", "stripe"]   # square | stripe | paypal | ...
  bank_feed: false
  notes: "Connect each via your connector settings; the plugin never connects for you."

branding:
  guidelines_path: ".finance-organizer/brand.md"

cadence:
  inbox_processing: "0 22 * * *"
  check_in: "weekly Monday"
